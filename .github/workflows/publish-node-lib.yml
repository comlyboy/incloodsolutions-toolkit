name: Publish Node library to npm

on:
  push:
    branches:
      - publish-node

jobs:
  publish-library:
    uses: comlyboy/ci-cd-workflow-templates/.github/workflows/publish-npm-library.yml@main
    with:
      working_directory: 'node'
    secrets: inherit

