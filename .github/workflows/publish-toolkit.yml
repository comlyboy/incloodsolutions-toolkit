name: Publish Toolkit library to npm

on:
  push:
    branches:
      - publish-toolkit

# jobs:
#   publish-library:
#     uses: comlyboy/ci-cd-workflow-templates/.github/workflows/publish-npm-package.yml@main
#     with:
#       working_directory: 'toolkit'
#     secrets: inherit

jobs:
  publish-library:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 'toolkit'

    env:
      PACKAGE_NAME: ""
      LOCAL_VERSION: ""
      PUBLISHED_VERSION: ""

    steps:
      - name: Checkout code (make repo branch code available in this pipeline)
        uses: actions/checkout@v4

      - name: Setup Node.js v24
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets._NPM_TOKEN }}

      - name: Install dependencies
        run: |
          pwd
          echo "** Installing dependencies... **"
          npm ci --no-audit --no-fund --quiet

      - name: Resolve package info
        run: |
          echo "PACKAGE_NAME=$(node -p "require('./package.json').name")" >> $GITHUB_ENV
          echo "LOCAL_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV
          PUBLISHED=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "not-published")
          echo "PUBLISHED_VERSION=$PUBLISHED" >> $GITHUB_ENV

      - name: Log versions
        run: |
          echo "Package name: $PACKAGE_NAME"
          echo "Local version: $LOCAL_VERSION"
          echo "Published version: $PUBLISHED_VERSION"

      - name: Prevent duplicate publish
        run: |
          if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "❌ Version already exists on npm"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access=public
