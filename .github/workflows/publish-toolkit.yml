name: Publish Toolkit library to npm

on:
  push:
    branches:
      - publish-toolkit

# jobs:
#   publish-library:
#     uses: comlyboy/ci-cd-workflow-templates/.github/workflows/publish-npm-package.yml@main
#     with:
#       working_directory: 'toolkit'
#     secrets: inherit

jobs:
  publish-library:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 'toolkit'

    steps:
      - name: Checkout code (make repo branch code available in this pipeline)
        uses: actions/checkout@v4

      - name: Setup Node.js v24
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets._NPM_TOKEN }}

      - name: Install dependencies
        run: |
          pwd
          echo "** Installing dependencies... **"
          npm ci --no-audit --no-fund --quiet

      - name: Build
        run: npm run build

      - name: Check if version already published
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          if npm view "$NAME@$VERSION" > /dev/null 2>&1; then
            echo "Version $VERSION already exists on npm. Skipping publish."
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access=public
